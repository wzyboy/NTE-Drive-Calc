name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  windows-installer:
    name: Build Windows installer
    runs-on: windows-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip

      - name: Resolve release version
        id: version
        shell: pwsh
        run: |
          $eventName = '${{ github.event_name }}'
          $appVersion = python -c "from src.app.constants import APP_VERSION; print(APP_VERSION)"

          if ($eventName -eq 'push') {
            $tag = '${{ github.ref_name }}'
            $version = $tag -replace '^v', ''

            if ($version -notmatch '^\d+\.\d+\.\d+([.-][0-9A-Za-z.-]+)?$') {
              throw "Tag '$tag' does not look like a release version. Use tags like '1.1.2' or 'v1.1.2'."
            }

            if ($appVersion -ne $version) {
              throw "Tag version '$version' must match src.app.constants.APP_VERSION '$appVersion'."
            }
          } else {
            $tag = ''
            $version = $appVersion

            if ($version -notmatch '^\d+\.\d+\.\d+([.-][0-9A-Za-z.-]+)?$') {
              throw "src.app.constants.APP_VERSION '$version' does not look like a release version."
            }
          }

          "tag=$tag" >> $env:GITHUB_OUTPUT
          "version=$version" >> $env:GITHUB_OUTPUT
          "installer=NTE_Drive_Calc_Setup_$version.exe" >> $env:GITHUB_OUTPUT

      - name: Install Python dependencies
        shell: pwsh
        run: |
          $stubDir = Join-Path $env:RUNNER_TEMP 'pip-msiexec-stub'
          New-Item -ItemType Directory -Force -Path $stubDir | Out-Null
          Set-Content -Path (Join-Path $stubDir 'msiexec.bat') -Encoding ascii -Value @(
            '@echo off',
            'echo Skipping vgamepad ViGEmBus driver install during dependency installation.',
            'exit /b 0'
          )
          $env:PATH = "$stubDir;$env:PATH"

          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y

          $iscc = @(
            'C:\Program Files (x86)\Inno Setup 6\ISCC.exe',
            'C:\Program Files\Inno Setup 6\ISCC.exe'
          ) | Where-Object { Test-Path $_ } | Select-Object -First 1

          if (-not $iscc) {
            $command = Get-Command ISCC.exe -ErrorAction SilentlyContinue
            if ($command) {
              $iscc = $command.Source
            }
          }

          if (-not $iscc) {
            throw 'ISCC.exe was not found after installing Inno Setup.'
          }

          "INNO_SETUP_ISCC=$iscc" >> $env:GITHUB_ENV

      - name: Build installer
        shell: pwsh
        env:
          APP_VERSION: ${{ steps.version.outputs.version }}
          PYTHONUTF8: '1'
        run: |
          python build_installer.py --version '${{ steps.version.outputs.version }}'
          $installer = 'installer\output\${{ steps.version.outputs.installer }}'
          if (-not (Test-Path $installer)) {
            throw "Expected installer was not created: $installer"
          }

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.version.outputs.installer }}
          path: installer/output/${{ steps.version.outputs.installer }}
          if-no-files-found: error

      - name: Create or update GitHub release
        if: github.event_name == 'push'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = '${{ steps.version.outputs.tag }}'
          $installer = 'installer\output\${{ steps.version.outputs.installer }}'

          gh release view $tag --repo $env:GITHUB_REPOSITORY *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag $installer --repo $env:GITHUB_REPOSITORY --clobber
          } else {
            gh release create $tag $installer --repo $env:GITHUB_REPOSITORY --title $tag --generate-notes
          }
